name = "smart-home-mcp"
type = "javascript"
main = "src/cloudflare-worker.ts"
compatibility_date = "2024-01-01"

# 构建配置
[build]
command = "pnpm build"
cwd = "."

# 开发配置
[env.development]
name = "smart-home-mcp-dev"
vars = { API_BASE_URL = "http://localhost:8787" }

# 生产配置
[env.production]
name = "smart-home-mcp-prod"
vars = { API_BASE_URL = "https://mcp-server.fuufhjn.link" }

# 预发布配置
[env.staging]
name = "smart-home-mcp-staging"
vars = { API_BASE_URL = "https://staging-api.example.com" }

# 可选：自定义路由（需要购买域名）
# [[routes]]
# pattern = "mcp.yourdomain.com/*"
# zone_id = "your-zone-id"

# 可选：KV命名空间绑定
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-namespace-id"
